<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gift Card">
  <meta name="theme-color" content="#b8967a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Gift Card - Leah Genish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Form Screen -->
  <div id="form-screen" class="screen active">
    <div class="form-header">
      <div class="logo-small">
        <svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 10 C40 25, 20 30, 15 45 C10 60, 25 75, 50 70 C75 75, 90 60, 85 45 C80 30, 60 25, 50 10Z" stroke="#b8967a" stroke-width="2" fill="none"/>
          <path d="M50 20 C43 30, 30 33, 27 42 C24 51, 33 60, 50 58 C67 60, 76 51, 73 42 C70 33, 57 30, 50 20Z" stroke="#b8967a" stroke-width="1.5" fill="none"/>
          <path d="M50 30 C46 36, 40 38, 38 43 C36 48, 41 53, 50 52 C59 53, 64 48, 62 43 C60 38, 54 36, 50 30Z" stroke="#b8967a" stroke-width="1" fill="none"/>
        </svg>
      </div>
      <h1>Leah Genish</h1>
      <p class="subtitle">Gift Card Generator</p>
      <a href="/admin.html" class="admin-link">ניהול כרטיסים</a>
    </div>

    <form id="gift-form">
      <div class="form-group">
        <label for="recipientName">שם מקבל/ת המתנה (עבור)</label>
        <input type="text" id="recipientName" placeholder="לדוגמה: דנה כהן" required>
      </div>

      <div class="form-group">
        <label for="treatmentDuration">משך טיפול</label>
        <select id="treatmentDuration" required>
          <option value="">בחר/י משך טיפול</option>
          <option value="30 דקות">30 דקות</option>
          <option value="45 דקות">45 דקות</option>
          <option value="60 דקות">60 דקות</option>
          <option value="75 דקות">75 דקות</option>
          <option value="90 דקות">90 דקות</option>
        </select>
      </div>

      <div class="form-group">
        <label for="validUntil">תוקף</label>
        <input type="date" id="validUntil" required>
      </div>

      <div class="form-group">
        <label for="blessing">ברכה</label>
        <textarea id="blessing" rows="3" placeholder="כתוב/כתבי ברכה אישית..."></textarea>
      </div>

      <div class="form-group">
        <label for="recipientPhone">טלפון מקבל/ת המתנה</label>
        <input type="tel" id="recipientPhone" placeholder="לדוגמה: 0541234567" dir="ltr" required>
      </div>

      <div class="form-group">
        <label for="buyerName">שם הקונה (לא יופיע בכרטיס)</label>
        <input type="text" id="buyerName" placeholder="לדוגמה: יוסי ישראלי">
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="isPaid">
          <span class="checkmark"></span>
          שולם
        </label>
      </div>

      <button type="submit" class="btn-generate">צור כרטיס מתנה</button>
    </form>
  </div>

  <!-- Preview Screen -->
  <div id="preview-screen" class="screen">
    <div class="preview-actions top-actions">
      <button id="btn-back" class="btn-icon" aria-label="חזרה">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l7-7-7-7"/></svg>
      </button>
    </div>

    <div id="card-container">
      <canvas id="gift-card-canvas"></canvas>
    </div>

    <div class="preview-actions bottom-actions">
      <button id="btn-whatsapp" class="btn-share whatsapp">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        שלח בוואטסאפ
      </button>
      <button id="btn-download" class="btn-share download">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        הורד תמונה
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
